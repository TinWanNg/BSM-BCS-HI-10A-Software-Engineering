<script>
        function toggleView(view) {
            const formOverlay = document.getElementById('login-form');
            const formCard = formOverlay.querySelector('.glass-card');
            const formTitle = document.getElementById('form-title');
            
            if (view === 'login' || view === 'register') {
                formTitle.innerText = view === 'login' ? 'Welcome Back' : 'Create Account';
                formOverlay.classList.remove('hidden');
                setTimeout(() => {
                    formOverlay.classList.remove('opacity-0');
                    formCard.classList.remove('translate-y-full');
                    formOverlay.classList.add('opacity-100');
                    formCard.classList.add('translate-y-0');
                }, 10);
            } else {
                formOverlay.classList.add('opacity-0');
                formCard.classList.add('translate-y-full');
                formOverlay.classList.remove('opacity-100');
                formCard.classList.remove('translate-y-0');
                setTimeout(() => {
                    formOverlay.classList.add('hidden');
                }, 300);
            }
        }

        // Close form on backdrop click
        document.getElementById('login-form').addEventListener('click', (e) => {
            if (e.target.id === 'login-form') toggleView('home');
        });
    </script>
