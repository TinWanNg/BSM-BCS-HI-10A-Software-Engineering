<script>
    // Micro-interaction for Progress Rings
    window.addEventListener('DOMContentLoaded', () => {
      const rings = document.querySelectorAll('.progress-ring-circle');
      rings.forEach(ring => {
        const radius = ring.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        ring.style.strokeDasharray = `${circumference} ${circumference}`;
        
        // Initial animation trigger
        const offsetAttr = ring.getAttribute('style').match(/stroke-dashoffset: ([0-9.]+)/);
        if (offsetAttr) {
            const finalOffset = offsetAttr[1];
            ring.style.strokeDashoffset = circumference;
            setTimeout(() => {
                ring.style.strokeDashoffset = finalOffset;
            }, 100);
        }
      });
    });

    // Random pet "interaction"
    document.querySelector('.animate-float').addEventListener('click', function() {
        this.style.transform = 'scale(1.1) translateY(-20px)';
        setTimeout(() => {
            this.style.transform = '';
        }, 300);
    });
  </script>
